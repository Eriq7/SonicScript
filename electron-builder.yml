appId: com.sonicscript.app
productName: SonicScript
copyright: Copyright © 2024 SonicScript

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - '!node_modules/.cache'

extraResources:
  - from: resources/
    to: resources/
    filter:
      - '**/*'
      - '!SonicScriptHelper.app'
      - '!SonicScriptHelper.app/**'
  - from: "resources/SonicScriptHelper.app"
    to: "SonicScriptHelper.app"

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  hardenedRuntime: true
  extendInfo:
    NSMicrophoneUsageDescription: "SonicScript needs microphone access to transcribe your speech."
    NSSpeechRecognitionUsageDescription: "SonicScript uses speech recognition to convert your voice to text."

dmg:
  title: SonicScript ${version}
  sign: false
